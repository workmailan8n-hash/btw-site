# fly.toml — BTW Studio site
# Deploy: `fly launch --no-deploy` (first time) → `fly deploy`

app = "btw-studio"
primary_region = "fra"

[build]

[env]
  NEXT_TELEMETRY_DISABLED = "1"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
